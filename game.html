<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Toba's Challenge</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap');
        body { margin: 0; background: #1e272e; color: white; font-family: 'Poppins', sans-serif; overflow: hidden; text-align: center; touch-action: none; }
        
        .header { padding: 20px; background: rgba(0,0,0,0.5); border-bottom: 2px solid #0fb9b1; }
        h1 { margin: 0; color: #0fb9b1; font-size: 1.5rem; }
        #score-board { font-size: 1.2rem; color: #fed330; margin-top: 10px; }
        
        .item { position: absolute; font-size: 3.5rem; cursor: pointer; user-select: none; animation: fall linear forwards; tap-highlight-color: transparent; -webkit-tap-highlight-color: transparent; }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* Custom In-Game Toast Notification */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #ff4757; color: white; padding: 15px 25px; border-radius: 30px;
            font-size: 1rem; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: top 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); z-index: 100; width: 80%;
        }
        
        /* Custom Modal for Winning */
        #win-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center;
        }
        .modal-content {
            background: linear-gradient(135deg, #2bcbba, #0fb9b1); padding: 40px 20px;
            border-radius: 20px; width: 80%; text-align: center; box-shadow: 0 0 30px #0fb9b1;
            animation: popIn 0.5s;
        }
        .modal-content h2 { font-size: 2rem; margin: 0 0 15px 0; }
        .btn-next { background: #fff; color: #0fb9b1; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; margin-top: 20px; cursor: pointer; }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast">Message here</div>

    <div class="header">
        <h1>Mission: Catch 5 🩺 to Unlock Gift!</h1>
        <div id="score-board">Stethoscopes: <span id="score">0</span> / 5</div>
    </div>

    <div id="win-modal">
        <div class="modal-content">
            <h2>Test Passed, Doc! 🎉</h2>
            <p>You proved you are ready for the real gift.</p>
            <button class="btn-next" onclick="window.location.href='finale.html'">Open Real Gift 🎁</button>
        </div>
    </div>

    <script>
        let score = 0;
        let gameInterval;
        let isGameOver = false;

        function showToast(msg, color) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.background = color;
            toast.style.top = '20px';
            setTimeout(() => { toast.style.top = '-100px'; }, 2500);
        }

        function createItem() {
            if(isGameOver) return;
            const items = ['🩺', '🩺', '🍔', '🍔', '🍟']; // Added more junk food!
            const itemType = items[Math.floor(Math.random() * items.length)];
            const itemDiv = document.createElement('div');
            
            itemDiv.classList.add('item');
            itemDiv.innerText = itemType;
            itemDiv.style.left = Math.random() * 80 + 'vw';
            itemDiv.style.top = '-80px';
            itemDiv.style.animationDuration = (Math.random() * 2 + 2.5) + 's'; 
            
            // Touch and Click logic
            const catchItem = (e) => {
                e.preventDefault();
                if(isGameOver) return;
                
                if(itemType === '🩺') {
                    score++;
                    document.getElementById('score').innerText = score;
                    itemDiv.remove();
                    showToast("+1 Doctor Point! ✨", "#2bcbba");
                    
                    if(score >= 5) {
                        isGameOver = true;
                        clearInterval(gameInterval);
                        document.getElementById('win-modal').style.display = 'flex';
                    }
                } else {
                    showToast("Oye Moti! Khana band kar! 🍔❌", "#ff4757");
                    itemDiv.remove();
                }
            };

            itemDiv.addEventListener('mousedown', catchItem);
            itemDiv.addEventListener('touchstart', catchItem, {passive: false});

            document.body.appendChild(itemDiv);
            setTimeout(() => { if(itemDiv.parentNode) itemDiv.remove(); }, 5000);
        }

        gameInterval = setInterval(createItem, 700);
    </script>
</body>
</html>
